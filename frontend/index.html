<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROMPT//CTF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --bg3: #111820;
    --green: #00ff88;
    --green2: #00cc66;
    --green-dim: rgba(0,255,136,0.12);
    --green-glow: rgba(0,255,136,0.35);
    --red: #ff3355;
    --amber: #ffaa00;
    --blue: #4488ff;
    --text: #c8d8c8;
    --text-dim: #5a7a5a;
    --border: rgba(0,255,136,0.18);
    --mono: 'Share Tech Mono', monospace;
    --display: 'Orbitron', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* grid bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* header */
  header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--display); font-size: clamp(28px, 6vw, 52px); font-weight: 900; color: var(--green); letter-spacing: 0.08em; text-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(0,255,136,0.15); }
  .logo span { color: var(--text-dim); }
  .tagline { font-size: 12px; color: var(--text-dim); letter-spacing: 0.2em; margin-top: 6px; text-transform: uppercase; }
  .blink { animation: blink 1.1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* login screen */
  #login-screen { max-width: 420px; margin: 60px auto; }
  .login-box { border: 1px solid var(--border); background: var(--bg2); border-radius: 4px; padding: 32px; }
  .login-box h2 { font-family: var(--display); font-size: 14px; color: var(--green); letter-spacing: 0.15em; margin-bottom: 20px; }
  .prompt-line { display: flex; align-items: center; gap: 8px; }
  .prompt-symbol { color: var(--green); font-size: 16px; }
  input[type=text] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--green);
    font-family: var(--mono);
    font-size: 16px;
    outline: none;
    flex: 1;
    padding: 4px 0;
    caret-color: var(--green);
  }
  input[type=text]::placeholder { color: var(--text-dim); }
  input[type=text]:focus { border-bottom-color: var(--green); }
  .btn {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background .15s, box-shadow .15s;
    margin-top: 16px;
    width: 100%;
  }
  .btn:hover { background: var(--green-dim); box-shadow: 0 0 12px var(--green-glow); }
  .btn:active { transform: scale(0.98); }
  .btn-sm { padding: 6px 14px; font-size: 12px; margin-top: 0; width: auto; }
  .btn-red { border-color: var(--red); color: var(--red); }
  .btn-red:hover { background: rgba(255,51,85,0.1); box-shadow: 0 0 12px rgba(255,51,85,0.3); }
  .btn-amber { border-color: var(--amber); color: var(--amber); }

  /* main layout */
  #main-screen { display: none; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .user-badge { font-size: 12px; color: var(--text-dim); }
  .user-badge span { color: var(--green); }

  /* tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 12px; letter-spacing: 0.1em; color: var(--text-dim); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* challenge grid */
  .challenges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .challenge-card {
    border: 1px solid var(--border);
    background: var(--bg2);
    border-radius: 4px;
    padding: 20px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    position: relative;
    overflow: hidden;
  }
  .challenge-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0;
    transition: opacity .2s;
  }
  .challenge-card:hover { border-color: var(--green); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
  .challenge-card:hover::before { opacity: 1; }
  .challenge-card.solved { border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.04); }
  .challenge-card.solved::after { content: '✓ SOLVED'; position: absolute; top: 12px; right: 12px; font-size: 10px; color: var(--green); letter-spacing: 0.1em; }
  .card-difficulty { font-size: 10px; letter-spacing: 0.15em; margin-bottom: 8px; }
  .diff-trivial { color: var(--green2); }
  .diff-easy { color: var(--amber); }
  .diff-medium { color: var(--red); }
  .card-title { font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 12px; }
  .card-points { font-size: 11px; color: var(--amber); }
  .guardrail-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 2px; margin-left: 8px; letter-spacing: 0.05em; }
  .gb-none { background: rgba(0,255,136,0.1); color: var(--green2); }
  .gb-wordlist { background: rgba(255,170,0,0.1); color: var(--amber); }
  .gb-llm { background: rgba(255,51,85,0.1); color: var(--red); }

  /* attack panel */
  #attack-panel { display: none; }
  .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .panel-title { font-family: var(--display); font-size: 16px; color: var(--green); }
  .back-btn { font-size: 11px; color: var(--text-dim); cursor: pointer; letter-spacing: 0.1em; }
  .back-btn:hover { color: var(--green); }
  .terminal {
    border: 1px solid var(--border);
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .terminal-header { background: var(--bg2); padding: 8px 14px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .tdot { width: 10px; height: 10px; border-radius: 50%; }
  .t-red { background: var(--red); opacity: 0.6; }
  .t-amber { background: var(--amber); opacity: 0.6; }
  .t-green { background: var(--green); opacity: 0.6; }
  .terminal-body { padding: 16px; }
  .output-area {
    min-height: 120px;
    max-height: 280px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
    word-break: break-word;
  }
  .output-area .msg-system { color: var(--text-dim); font-size: 12px; }
  .output-area .msg-user { color: var(--blue); }
  .output-area .msg-llm { color: var(--green); }
  .output-area .msg-blocked { color: var(--red); }
  .output-area .msg-label { font-size: 10px; letter-spacing: 0.1em; opacity: 0.6; margin-top: 12px; }
  .input-area { display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 64px;
    max-height: 200px;
    outline: none;
    caret-color: var(--green);
    line-height: 1.5;
    border-radius: 2px;
  }
  textarea:focus { border-color: var(--green); box-shadow: 0 0 8px rgba(0,255,136,0.15); }
  .loading-dots span { animation: ldot 1.2s infinite; display: inline-block; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes ldot { 0%,80%,100% { opacity: 0.2; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

  /* flag submit */
  .flag-section { border: 1px solid rgba(255,170,0,0.2); background: rgba(255,170,0,0.04); border-radius: 4px; padding: 16px; margin-top: 12px; }
  .flag-section h4 { font-family: var(--display); font-size: 11px; color: var(--amber); letter-spacing: 0.15em; margin-bottom: 12px; }
  .flag-input-row { display: flex; gap: 8px; }
  .flag-input { font-family: var(--mono); font-size: 13px; background: var(--bg); border: 1px solid rgba(255,170,0,0.3); color: var(--amber); padding: 8px 12px; flex: 1; outline: none; caret-color: var(--amber); border-radius: 2px; }
  .flag-input:focus { border-color: var(--amber); }
  .msg-success { color: var(--green); }
  .msg-fail { color: var(--red); }

  /* scoreboard */
  .scoreboard { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .sb-header { background: var(--bg2); padding: 10px 16px; display: grid; grid-template-columns: 40px 1fr 80px 120px; gap: 8px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
  .sb-row { padding: 12px 16px; display: grid; grid-template-columns: 40px 1fr 80px 120px; gap: 8px; border-bottom: 1px solid rgba(0,255,136,0.05); align-items: center; transition: background .1s; }
  .sb-row:hover { background: var(--green-dim); }
  .sb-row:last-child { border-bottom: none; }
  .sb-rank { font-family: var(--display); font-size: 12px; color: var(--text-dim); }
  .sb-rank.top1 { color: var(--green); }
  .sb-rank.top2 { color: var(--amber); }
  .sb-rank.top3 { color: #aaaaaa; }
  .sb-name { color: var(--text); font-size: 13px; }
  .sb-pts { color: var(--amber); font-size: 13px; text-align: right; }
  .sb-solved { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .sb-badge { width: 18px; height: 18px; border-radius: 2px; background: var(--green-dim); border: 1px solid var(--border); font-size: 9px; color: var(--green); display: flex; align-items: center; justify-content: center; }

  .empty-state { text-align: center; padding: 48px; color: var(--text-dim); font-size: 13px; }
  .status-line { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; letter-spacing: 0.05em; }
  .status-ok { color: var(--green); }
  .status-err { color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">PROMPT<span>//</span>CTF <span class="blink">_</span></div>
    <div class="tagline">Internal Prompt Injection Challenge Platform</div>
  </header>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h2>&gt; IDENTIFY YOURSELF</h2>
      <div class="status-line" id="login-status">Ange ditt användarnamn för att börja</div>
      <div class="prompt-line">
        <span class="prompt-symbol">&gt;</span>
        <input type="text" id="username-input" placeholder="username" maxlength="30" autocomplete="off"/>
      </div>
      <button class="btn" onclick="login()">CONNECT &rarr;</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen">
    <div class="top-bar">
      <div class="user-badge">// logged in as <span id="display-username"></span></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-amber" onclick="loadScoreboard()">SCOREBOARD</button>
        <button class="btn btn-sm btn-red" onclick="logout()">DISCONNECT</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('challenges')">CHALLENGES</div>
      <div class="tab" onclick="showTab('scoreboard')">SCOREBOARD</div>
    </div>

    <!-- Challenges tab -->
    <div id="tab-challenges">
      <div id="challenges-grid" class="challenges-grid"></div>
      <div id="attack-panel">
        <div class="panel-header">
          <span class="back-btn" onclick="closeAttack()">&larr; BACK</span>
          <button id="reset-session-btn" class="btn btn-sm btn-red" style="display:none" onclick="resetSession()">RESET SESSION</button>
          <button id="reset-session-btn" class="btn btn-sm btn-red" style="display:none" onclick="resetSession()">RESET SESSION</button>
          <span class="panel-title" id="panel-title"></span>
          <span id="panel-guardrail"></span>
        </div>
        <div class="status-line" id="attack-status"></div>
        <div class="terminal">
          <div class="terminal-header">
            <div class="tdot t-red"></div>
            <div class="tdot t-amber"></div>
            <div class="tdot t-green"></div>
            <span style="margin-left:8px">TARGET LLM</span>
          </div>
          <div class="terminal-body">
            <div class="output-area" id="output-area">
              <div class="msg-system">// Skriv din attack prompt nedan och tryck SEND.</div>
            </div>
            <div class="input-area">
              <textarea id="attack-input" placeholder="Skriv din attack prompt..." rows="3"></textarea>
              <button class="btn btn-sm" id="send-btn" onclick="sendAttack()">SEND</button>
            </div>
          </div>
        </div>
        <div class="flag-section">
          <h4>&gt; SUBMIT FLAG</h4>
          <div class="flag-input-row">
            <input type="text" class="flag-input" id="flag-input" placeholder="..."/>
            <button class="btn btn-sm btn-amber" onclick="submitFlag()">SUBMIT</button>
          </div>
          <div id="flag-result" style="margin-top:8px;font-size:12px"></div>
        </div>
      </div>
    </div>

    <!-- Scoreboard tab -->
    <div id="tab-scoreboard" style="display:none">
      <div id="scoreboard-container"><div class="empty-state">Laddar scoreboard...</div></div>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8000"; // change to your local IP for network play
let currentUser = null;
let currentChallenge = null;
let solved = [];
let challenges = [];

// ---- Auth ----
async function login() {
  const username = document.getElementById("username-input").value.trim();
  if (!username) return;
  const statusEl = document.getElementById("login-status");
  statusEl.textContent = "Ansluter...";
  try {
    await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username })
    });
    currentUser = username;
    localStorage.setItem("ctf_user", username);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-screen").style.display = "block";
    document.getElementById("display-username").textContent = username;
    await loadChallenges();
  } catch (e) {
    statusEl.innerHTML = '<span class="status-err">Kunde inte ansluta till backend. Är servern igång?</span>';
  }
}

function logout() {
  localStorage.removeItem("ctf_user");
  currentUser = null;
  location.reload();
}

// ---- Challenges ----
async function loadChallenges() {
  try {
    const r = await fetch(`${API}/challenges`);
    challenges = await r.json();
    // load solved from scoreboard
    const sb = await fetch(`${API}/scoreboard`);
    const sbData = await sb.json();
    const me = sbData.find(p => p.username === currentUser);
    solved = me ? me.solved : [];
    renderChallenges();
  } catch (e) {
    document.getElementById("challenges-grid").innerHTML =
      '<div class="empty-state status-err">Kunde inte ladda challenges.</div>';
  }
}

function renderChallenges() {
  const grid = document.getElementById("challenges-grid");
  grid.innerHTML = challenges.map(c => {
    const isSolved = solved.includes(c.id);
    const diffClass = { "Trivial": "diff-trivial", "Lätt": "diff-easy", "Medium": "diff-medium" }[c.difficulty] || "";
    const guardrailLabel = { null: ["INGEN GUARDRAIL", "gb-none"], "wordlist": ["WORDLIST", "gb-wordlist"], "llm": ["LLM GUARDRAIL", "gb-llm"] }[c.guardrail] || ["?", ""];
    return `
      <div class="challenge-card ${isSolved ? "solved" : ""}" onclick="openChallenge('${c.id}')">
        <div class="card-difficulty ${diffClass}">${c.difficulty.toUpperCase()}
          <span class="guardrail-badge ${guardrailLabel[1]}">${guardrailLabel[0]}</span>
        </div>
        <div class="card-title">${c.title}</div>
        <div class="card-desc">${c.description}</div>
        <div class="card-points">${c.points} pts</div>
      </div>`;
  }).join("");
}

function openChallenge(id) {
  currentChallenge = challenges.find(c => c.id === id);
  if (!currentChallenge) return;
  document.getElementById("challenges-grid").style.display = "none";
  document.getElementById("attack-panel").style.display = "block";
  document.getElementById("panel-title").textContent = currentChallenge.title;
  const gl = { null: "", "wordlist": '<span class="guardrail-badge gb-wordlist">WORDLIST ACTIVE</span>', "llm": '<span class="guardrail-badge gb-llm">LLM GUARD ACTIVE</span>' }[currentChallenge.guardrail] || "";
  document.getElementById("panel-guardrail").innerHTML = gl;
  document.getElementById("output-area").innerHTML = '<div class="msg-system">// Challenge: ' + currentChallenge.description + '</div>';
  document.getElementById("flag-input").value = "";
  document.getElementById("flag-result").textContent = "";
  document.getElementById("attack-status").innerHTML = `<span class="status-ok">TARGET ACQUIRED</span> — ${currentChallenge.points} pts`;
  const resetBtn = document.getElementById("reset-session-btn");
  if (currentChallenge.multi_turn) {
    resetBtn.style.display = "inline-block";
  } else {
    resetBtn.style.display = "none";
  }
}

function closeAttack() {
  document.getElementById("attack-panel").style.display = "none";
  document.getElementById("challenges-grid").style.display = "grid";
  currentChallenge = null;
}

// ---- Attack ----
async function sendAttack() {
  const input = document.getElementById("attack-input").value.trim();
  if (!input || !currentChallenge) return;
  const output = document.getElementById("output-area");
  const btn = document.getElementById("send-btn");

  output.innerHTML += `<div class="msg-label">YOU &gt;</div><div class="msg-user">${escapeHtml(input)}</div>`;
  output.innerHTML += `<div class="loading-dots" id="loading"><span>.</span><span>.</span><span>.</span></div>`;
  output.scrollTop = output.scrollHeight;
  btn.disabled = true;
  document.getElementById("attack-input").value = "";

  try {
    const r = await fetch(`${API}/attack`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: currentUser, challenge_id: currentChallenge.id, user_input: input })
    });
    const data = await r.json();
    document.getElementById("loading")?.remove();

    if (data.blocked) {
      output.innerHTML += `<div class="msg-label">GUARDRAIL &gt;</div><div class="msg-blocked">⛔ BLOCKED: ${escapeHtml(data.block_reason || "Input blocked")}</div>`;
    } else {
      output.innerHTML += `<div class="msg-label">TARGET &gt;</div><div class="msg-llm">${escapeHtml(data.response)}</div>`;
    }
  } catch (e) {
    document.getElementById("loading")?.remove();
    output.innerHTML += `<div class="msg-blocked">ERR: ${e.message}</div>`;
  }

  output.scrollTop = output.scrollHeight;
  btn.disabled = false;
}

async function submitFlag() {
  const flag = document.getElementById("flag-input").value.trim();
  if (!flag || !currentChallenge) return;
  const r = await fetch(`${API}/submit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: currentUser, challenge_id: currentChallenge.id, flag })
  });
  const data = await r.json();
  const el = document.getElementById("flag-result");
  if (data.correct) {
    solved.push(currentChallenge.id);
    renderChallenges();
    el.innerHTML = `
      <span class="msg-success">✓ ${data.message}</span><br>
      <button class="btn btn-sm" style="margin-top:12px" onclick="closeAttack()">
        &larr; TILLBAKA TILL CHALLENGES
      </button>`;
  } else {
    el.innerHTML = `<span class="msg-fail">✗ ${data.message}</span>`;
  }
}

// ---- Scoreboard ----
async function loadScoreboard() {
  showTab("scoreboard");
  try {
    const r = await fetch(`${API}/scoreboard`);
    const data = await r.json();
    const container = document.getElementById("scoreboard-container");
    if (!data.length) { container.innerHTML = '<div class="empty-state">Inga spelare ännu.</div>'; return; }
    container.innerHTML = `
      <div class="scoreboard">
        <div class="sb-header"><span>RANK</span><span>OPERATOR</span><span>PTS</span><span style="text-align:right">SOLVED</span></div>
        ${data.map((p, i) => `
          <div class="sb-row">
            <span class="sb-rank ${i===0?"top1":i===1?"top2":i===2?"top3":""}">#${p.rank}</span>
            <span class="sb-name ${p.username===currentUser?"status-ok":""}">${escapeHtml(p.username)}</span>
            <span class="sb-pts">${p.points}</span>
            <div class="sb-solved">${p.solved.map(s=>`<div class="sb-badge">${s}</div>`).join("")}</div>
          </div>`).join("")}
      </div>`;
  } catch (e) {
    document.getElementById("scoreboard-container").innerHTML = '<div class="empty-state status-err">Kunde inte ladda scoreboard.</div>';
  }
}

// ---- Tabs ----
function showTab(name) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ["challenges","scoreboard"][i]===name));
  document.getElementById("tab-challenges").style.display = name==="challenges" ? "block" : "none";
  document.getElementById("tab-scoreboard").style.display = name==="scoreboard" ? "block" : "none";
  if (name==="scoreboard") loadScoreboard();
}

// ---- Utils ----
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("attack-input")?.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAttack(); }
});
document.getElementById("username-input")?.addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

// Auto-login if returning
const saved = localStorage.getItem("ctf_user");
if (saved) {
  document.getElementById("username-input").value = saved;
  login();
}

async function resetSession() {
    if (!currentChallenge) return;
    await fetch(`${API}/reset-session?username=${currentUser}&challenge_id=${currentChallenge.id}`, {
        method: "POST"
    });
    document.getElementById("output-area").innerHTML = '<div class="msg-system">// Session återställd. Konversationshistorik rensad.</div>';
}

</script>
